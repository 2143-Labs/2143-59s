# Base Helm Values — shared defaults across all 3 clusters (ashburn, hillsboro, nuremberg)
# Loaded first; per-cluster values files override these settings.
# Reference from Application manifests as:
#   helm:
#     valueFiles:
#       - ../../clusters/base-values.yaml
#       - ../../clusters/<region>/<component>-values.yaml

---
# Traefik — identical across all clusters
traefik:
  providers:
    kubernetesIngress:
      enabled: true
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true
  experimental:
    plugins:
      crowdsec-bouncer-traefik-plugin:
        moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
        version: "v1.4.5"
  ports:
    web:
      # hostPort: 80       # DISABLED — causes template errors in Traefik v34+
    websecure:
      # hostPort: 443      # DISABLED — causes template errors in Traefik v34+
  service:
    type: ClusterIP
  # hostNetwork: true      # DISABLED — combine with hostPort, see above

---
# Istio — shared meshConfig and pilot across all clusters
istio:
  meshConfig:
    accessLogFile: /dev/stdout
    defaultConfig:
      terminationDrainDuration: 45s
  pilot:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi

---
# CrowdSec — identical COLLECTIONS across all clusters
crowdsec:
  lapi:
    env:
      - name: COLLECTIONS
        value: "crowdsecurity/linux crowdsecurity/traefik crowdsecurity/http-cve"
