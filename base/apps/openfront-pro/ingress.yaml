# openfront-pro Ingress
# Wave 6
# Domain: openfront.9s.pics
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openfront-pro
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
    traefik.ingress.kubernetes.io/router.middlewares: traefik-crowdsec-protected@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - openfront.9s.pics
      secretName: openfront-9s-pics-tls
  rules:
    - host: openfront.9s.pics
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openfront-pro
                port:
                  number: 80
