# poe2-sale-redirector — stateless redirect service (raw IP, no ingress)
# Wave 6
# Runs on raw IP. No TLS via cert-manager (game traffic).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: poe2-sale-redirector
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poe2-sale-redirector
  template:
    metadata:
      labels:
        app: poe2-sale-redirector
    spec:
      hostNetwork: true
      containers:
        - name: app
          image: ghcr.io/john2143/poe2-sale-redirector:latest
          ports:
            - containerPort: 8081
              hostPort: 8081
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: poe2-sale-redirector
  namespace: default
spec:
  selector:
    app: poe2-sale-redirector
  ports:
    - port: 8081
      targetPort: 8081
