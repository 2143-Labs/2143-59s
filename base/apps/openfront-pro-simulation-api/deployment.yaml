# openfront-pro-simulation-api — backend simulation API
# Wave 6
# Domain: simulation-api.9s.pics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfront-pro-simulation-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: openfront-pro-simulation-api
  template:
    metadata:
      labels:
        app: openfront-pro-simulation-api
    spec:
      containers:
        - name: app
          image: ghcr.io/john2143/openfront-pro-simulation-api:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
