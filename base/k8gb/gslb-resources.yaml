---
# NOTE: poe.sale, poe2.sale, derp-server, TeamSpeak are raw-IP services.
# They do NOT get Gslb CRDs. DNS A records point directly at the raw IPs.
# No k8gb involvement. No geoip routing. These domains are NOT under 9s.pics.
