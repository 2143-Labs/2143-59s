# k8gb Gslb Resources — geoip DNS failover for HTTP apps
# Wave 2: deployed after ExternalDNS is ready
# Domain: 9s.pics
---
# Gslb for john2143-com (image host)
apiVersion: k8gb.absa.oss/v1beta1
kind: Gslb
metadata:
  name: john2143-com
  namespace: k8gb
spec:
  strategy:
    type: geoip
    dnsTtlSeconds: 60
  ingress:
    rules:
      - host: john2143.9s.pics
        http:
          paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: john2143-com
                  port:
                    number: 80
---
