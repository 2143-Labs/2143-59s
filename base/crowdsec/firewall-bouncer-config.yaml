# CrowdSec Firewall Bouncer — iptables integration
# Wave 3
# Blocks attacking IPs at the kernel level via iptables
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: crowdsec-firewall-bouncer
  namespace: crowdsec
spec:
  selector:
    matchLabels:
      app: crowdsec-firewall-bouncer
  template:
    metadata:
      labels:
        app: crowdsec-firewall-bouncer
    spec:
      hostNetwork: true
      containers:
        - name: firewall-bouncer
          image: crowdsecurity/crowdsec-firewall-bouncer:latest
          env:
            - name: LAPI_URL
              value: "http://crowdsec-service.crowdsec.svc.cluster.local:8080"
            - name: BOUNCER_KEY_crowdsec-firewall
              valueFrom:
                secretKeyRef:
                  name: crowdsec-bouncer-key
                  key: key
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
