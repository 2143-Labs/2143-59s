# cert-manager Certificates — wildcard and specific
# Wave 0 (after ClusterIssuer)
# Domain: 9s.pics
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-9s-pics
  namespace: traefik
spec:
  secretName: wildcard-9s-pics-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "*.9s.pics"
    - "9s.pics"
---
apiVersion: cert-manager.io/v1
