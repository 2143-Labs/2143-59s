# cert-manager ClusterIssuer — Let's Encrypt staging
# Wave 0
# Domain: 9s.pics
# DNS01 via deSEC webhook (no more PowerDNS/RFC2136)
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: john@9s.pics
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - dns01:
          webhook:
            groupName: desec.9s.pics
            solverName: desec-http
            config:
              apiUrl: https://desec.io/api/v1
              domainName: 9s.pics
              secretName: desec-token
              secretKeyName: token