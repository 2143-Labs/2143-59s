# deSEC cert-manager Webhook — ACME DNS01 solver
# Wave 0 (alongside ClusterIssuer)
# Uses deSEC API to create ACME DNS01 challenge TXT records.
#
# The desec-token Secret is injected by k8s-secrets-bootstrap host oneshot.
# This manifest is a placeholder documenting the expected shape.
---
apiVersion: v1
kind: Secret
metadata:
  name: desec-token
  namespace: cert-manager
type: Opaque
stringData:
  # PLACEHOLDER: injected at runtime by k8s-secrets-bootstrap
  token: PLACEHOLDER_DESEC_TOKEN