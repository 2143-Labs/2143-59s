# cert-manager ClusterIssuer — Let's Encrypt production via HTTP01
# Wave 0
# Uses HTTP01 challenge (no DNS01, no deSEC API calls needed)
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: john@9s.pics
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: traefik
