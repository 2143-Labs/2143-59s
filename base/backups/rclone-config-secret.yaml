
# rclone Configuration Secret — shape documentation only
# Wave -1 (secrets deploy before anything that references them)
#
# Secret data is injected by the secret-injector Job (wave -2).
# Actual rclone.conf comes from NixOS host agenix at boot:
#   agenix -d hetzner/rclone-b2-password.age
#
# rclone remotes (documented):
#   b2-crypt:    Backblaze B2 bucket encrypted with rclone crypt
#   rustfs-crypt: Home RustFS (S3-compatible) encrypted with rclone crypt
#
# Do NOT add `data:` here — ArgoCD selfHeal would overwrite injected values.
---
apiVersion: v1
kind: Secret
metadata:
  name: rclone-config
  namespace: backup
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque