# rclone Configuration Secret — crypt remotes for B2 and home RustFS
# Wave -1 (secrets deploy before anything that references them)
#
# PLACEHOLDER: Actual rclone.conf is created by NixOS host agenix at boot.
#   agenix -d hetzner/rclone-b2-password.age
# This manifest documents the expected shape.
#
# rclone remotes:
#   b2-crypt:    Backblaze B2 bucket encrypted with rclone crypt
#   rustfs-crypt: Home RustFS (S3-compatible) encrypted with rclone crypt
---
apiVersion: v1
kind: Secret
metadata:
  name: rclone-config
  namespace: backup
type: Opaque
data:
  # PLACEHOLDER: base64-encoded rclone.conf with [b2-crypt] and [rustfs-crypt] sections
  rclone.conf: UkVQTEFDRV9XSVRIX1JFQUxfUkNMT05FX0NPTkZJRw==
