# RFC2136 TSIG Secret — used by ExternalDNS to update PowerDNS
# Wave -1: deployed before components that reference it
#
# PLACEHOLDER: Actual secret data is created by NixOS host agenix at boot.
#   agenix -d hetzner/powerdns-tsig-key.age
# This manifest documents the expected shape. The real Secret is injected by
# the host or created manually before ArgoCD syncs.
#
# Required keys:
#   rfc2136TsigSecret — HMAC-SHA256 TSIG key for RFC2136 DNS UPDATE
---
apiVersion: v1
kind: Secret
metadata:
  name: rfc2136-credentials
  namespace: external-dns
type: Opaque
data:
  # PLACEHOLDER: base64-encoded TSIG secret
  rfc2136TsigSecret: UKVQTEFDRV9XSVRIX1JFQUxfVEhJR19LRVk=
