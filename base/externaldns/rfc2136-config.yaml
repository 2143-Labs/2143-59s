# ExternalDNS RFC2136 Provider Configuration
# Wave 2: References rfc2136-credentials Secret (wave -1)
# Domain: 9s.pics
#
# Per-cluster overrides (host field) are set in clusters/<region>/externaldns-values.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: externaldns-config
  namespace: external-dns
data:
  # These are the shared defaults. Per-cluster values override `rfc2136.host`.
  rfc2136-port: "53"
  rfc2136-zone: "9s.pics"
  rfc2136-tsig-keyname: "externaldns"
  rfc2136-tsig-algorithm: "hmac-sha256"
  domain-filters: "9s.pics"
  txt-prefix: "extdns-"
  txt-owner-id: "externaldns"
  load-balancing-strategy: "round-robin"
