# CloudNativePG Cluster — PostgreSQL for PowerDNS + Temporal
# Wave 5
# Each k3s cluster gets its own independent PostgreSQL instance (instances: 1).
# Databases (pdns, temporal) and roles are created declaratively via spec.managed.
# Backup is deferred — B2 credentials not yet configured.
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-postgres
  namespace: default
spec:
  instances: 1
  storage:
    size: 10Gi
  wal:
    size: 2Gi

  # Bootstrap via initdb (CNPG 1.25 — spec.managed not yet available)
  bootstrap:
    initdb:
      database: pdns
      owner: pdns
      postInitSQL:
        - CREATE DATABASE temporal OWNER pdns

# PLACEHOLDER: pdns-postgres-password and temporal-postgres-password Secrets
# are injected by k8s-secrets-bootstrap systemd oneshot — NOT managed by ArgoCD.