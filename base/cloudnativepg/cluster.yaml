# CloudNativePG Cluster — PostgreSQL for Temporal
# Wave 5
# Each k3s cluster gets its own independent PostgreSQL instance (instances: 1).
# Roles and passwords are managed declaratively via spec.managed.roles.
# Backup is deferred — B2 credentials not yet configured.
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-postgres
  namespace: default
spec:
  managed:
    roles:
      - name: temporal
        ensure: present
        login: true
        createDB: true
        passwordSecret:
          name: temporal-postgres-password
          key: password
  instances: 1
  storage:
    size: 10Gi
  wal:
    size: 2Gi

  # Bootstrap via initdb with managed roles (CNPG 1.25+)
  bootstrap:
    initdb:
      database: temporal
      owner: temporal
# temporal-postgres-password Secret is injected by
# k8s-secrets-bootstrap systemd oneshot — NOT managed by ArgoCD.