# NodePort Service — exposes CNPG PostgreSQL on port 30432
# Wave 5 (deployed alongside the CNPG Cluster CR)
#
# PowerDNS (on NixOS host) connects to 127.0.0.1:30432.
# Home Pi connects to k3s-ashburn.ts.9s.pics:30432 via Tailscale.
# Selector targets the CNPG primary pod (cnpg.io/instanceRole: primary).
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-postgres-nodeport
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  type: NodePort
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
      protocol: TCP
  selector:
    cnpg.io/cluster: temporal-postgres
    cnpg.io/instanceRole: primary
