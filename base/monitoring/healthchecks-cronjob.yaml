# Healthchecks.io CronJob — pings Healthchecks.io on a schedule
# Wave 8 (backups and monitoring deploy last)
# Verifies: certificate expiry, DNS resolution, endpoint health
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: healthchecks-ping
  namespace: monitoring
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: healthcheck
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  curl -fsS "${HC_URL}" > /dev/null || true
              envFrom:
                - secretRef:
                    name: healthchecks-url
          restartPolicy: OnFailure

# PLACEHOLDER: healthchecks-url Secret — shape documentation only
# Secret data is injected by the secret-injector Job (wave -2).
# Contains: HC_URL — Healthchecks.io ping URL (manual, from Healthchecks.io dashboard)
# Do NOT add `data:` here — ArgoCD selfHeal would overwrite injected values.
apiVersion: v1
kind: Secret
metadata:
  name: healthchecks-url
  namespace: monitoring
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque