# MongoDB Encryption Key Secret
# Wave -1 (secrets deploy before MongoDB)
#
# PLACEHOLDER: Actual secret data is created by NixOS host agenix at boot.
#   agenix -d hetzner/mongodb-encryption-key.age
# This manifest documents the expected shape.
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-encryption-key
  namespace: default
type: Opaque
data:
  # PLACEHOLDER: base64-encoded 32-byte AES-256 encryption key
  encryption.key: UkVQTEFDRV9XSVRIX1JFQUxfTU9OR09fRU5DUllQVElPTl9LRVk=
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-creds
  namespace: default
type: Opaque
data:
  # PLACEHOLDER: base64-encoded password
  password: UkVQTEFDRV9XSVRIX1JFQUxfTU9OR09fUEFTU1dPUkQ=
