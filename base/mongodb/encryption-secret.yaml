
# MongoDB Encryption Key and Credentials Secrets — shape documentation only
# Wave -1 (secrets deploy before MongoDB)
#
# Secret data is injected by the secret-injector Job (wave -2).
# Actual values come from NixOS host agenix at boot:
#   agenix -d hetzner/mongodb-encryption-key.age
#   agenix -d hetzner/mongodb-password.age
#
# Do NOT add `data:` here — ArgoCD selfHeal would overwrite injected values.
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-encryption-key
  namespace: default
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-creds
  namespace: default
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque