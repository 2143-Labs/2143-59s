# MongoDB Backup CronJob — hourly mongodump → Backblaze B2 (rclone crypt)
# Wave 8 (backups deploy last)
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongo-backup
  namespace: default
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: mongodump
              image: mongo:7
              command:
                - /bin/sh
                - -c
                - |
                  mongodump --uri="mongodb://admin:$MONGO_PASSWORD@mongo:27017" --archive --gzip | \
                  rclone rcat b2-crypt:mongo-backups/$(date +%Y%m%d-%H%M).archive.gz
              env:
                - name: MONGO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mongo-creds
                      key: password
              volumeMounts:
                - name: rclone-config
                  mountPath: /etc/rclone
                  readOnly: true
          volumes:
            - name: rclone-config
              secret:
                secretName: rclone-config
          restartPolicy: OnFailure
