# MongoDB — self-hosted, encryption at rest
# Wave 5
# Active on Ashburn (replicas: 1), standby (replicas: 0) on Hillsboro and Nuremberg
# Per-cluster replica count set in clusters/<region>/mongodb-override.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          args:
            - "--auth"
          env:

            - name: MONGO_INITDB_ROOT_USERNAME
              value: admin
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-creds
                  key: password
          ports:
            - containerPort: 27017
          volumeMounts:
            - mountPath: /data/db
              name: mongodata

      volumes:
        - name: mongodata
          persistentVolumeClaim:
            claimName: mongo-pvc
