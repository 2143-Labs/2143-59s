# Secret Injector Job — agenix → Kubernetes Secret injection
# Wave -2 (runs before secrets wave -1)
#
# Reads agenix-decrypted secrets from /run/agenix/ on the NixOS host and creates/updates
# Kubernetes Secrets. This formalizes what was previously a manual `kubectl create secret`
# step into a declarative, idempotent, ArgoCD-observable operation.

# Required Secrets (mapping from agenix file to K8s Secret):
#   /run/agenix/powerdns-tsig-key      → external-dns/rfc2136-credentials   (rfc2136TsigSecret)
#   /run/agenix/mongodb-encryption-key → default/mongo-encryption-key      (encryption.key)
#   /run/agenix/mongodb-password       → default/mongo-creds               (password)
#   /run/agenix/seaweedfs-master-key   → seaweedfs/seaweedfs-master-key    (master.key)
#   /run/agenix/seaweedfs-s3-creds     → default/seaweedfs-s3-creds        (accessKey, secretKey)
#   /run/agenix/rclone-b2-password     → backup/rclone-config              (rclone.conf)
#   /run/agenix/b2-application-key     → default/b2-credentials            (S3_ACCESS_KEY, S3_SECRET_KEY)
#   /run/agenix/temporal-postgres-pass → default/temporal-postgres-password (password)
#   /run/agenix/healthchecks-url       → monitoring/healthchecks-url       (HC_URL)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-injector
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-injector
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secret-injector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secret-injector
subjects:
  - kind: ServiceAccount
    name: secret-injector
    namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: secret-injector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: secret-injector
      restartPolicy: Never
      containers:
        - name: injector
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "=== Secret Injector: agenix → Kubernetes Secrets ==="

              # RFC2136 TSIG key for ExternalDNS
              if [ -f /agenix/powerdns-tsig-key ]; then
                kubectl create secret generic rfc2136-credentials \
                  --namespace=external-dns \
                  --from-file=rfc2136TsigSecret=/agenix/powerdns-tsig-key \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  ✓ rfc2136-credentials"
              fi

              # MongoDB encryption key
              if [ -f /agenix/mongodb-encryption-key ]; then
                kubectl create secret generic mongo-encryption-key \
                  --namespace=default \
                  --from-file=encryption.key=/agenix/mongodb-encryption-key \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  ✓ mongo-encryption-key"
              fi

              # MongoDB admin password
              if [ -f /agenix/mongodb-password ]; then
                kubectl create secret generic mongo-creds \
                  --namespace=default \
                  --from-file=password=/agenix/mongodb-password \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  ✓ mongo-creds"
              fi

              # SeaweedFS master key
              if [ -f /agenix/seaweedfs-master-key ]; then
                kubectl create secret generic seaweedfs-master-key \
                  --namespace=seaweedfs \
                  --from-file=master.key=/agenix/seaweedfs-master-key \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  ✓ seaweedfs-master-key"
              fi


              # rclone config (B2 + RustFS crypt remotes)
              # Injected into both backup and default namespaces.
              #   backup namespace: used by object-store-backup CronJob
              #   default namespace: used by mongo-backup CronJob
              if [ -f /agenix/rclone-b2-password ]; then
                kubectl create secret generic rclone-config \
                  --namespace=backup \
                  --from-file=rclone.conf=/agenix/rclone-b2-password \
                  --dry-run=client -o yaml | kubectl apply -f -
                kubectl create secret generic rclone-config \
                  --namespace=default \
                  --from-file=rclone.conf=/agenix/rclone-b2-password \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  ✓ rclone-config"
              fi

              # Backblaze B2 credentials
              if [ -f /agenix/b2-application-key ]; then
                kubectl create secret generic b2-credentials \
                  --namespace=default \
                  --from-literal=S3_ACCESS_KEY="$(head -1 /agenix/b2-application-key)" \
                  --from-literal=S3_SECRET_KEY="$(tail -1 /agenix/b2-application-key)" \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  ✓ b2-credentials"
              fi

              # SeaweedFS S3 credentials (for john2143-com app)
              if [ -f /agenix/seaweedfs-s3-creds ]; then
                kubectl create secret generic seaweedfs-s3-creds \
                  --namespace=default \
                  --from-literal=accessKey="$(head -1 /agenix/seaweedfs-s3-creds)" \
                  --from-literal=secretKey="$(tail -1 /agenix/seaweedfs-s3-creds)" \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  ✓ seaweedfs-s3-creds"
              fi

              # Temporal PostgreSQL password
              if [ -f /agenix/temporal-postgres-pass ]; then
                kubectl create secret generic temporal-postgres-password \
                  --namespace=default \
                  --from-file=password=/agenix/temporal-postgres-pass \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  ✓ temporal-postgres-password"
              fi


              # Healthchecks.io ping URL
              # Injected into both monitoring and backup namespaces.
              #   monitoring namespace: used by healthchecks-ping CronJob
              #   backup namespace: used by object-store-backup CronJob
              if [ -f /agenix/healthchecks-url ]; then
                kubectl create secret generic healthchecks-url \
                  --namespace=monitoring \
                  --from-file=HC_URL=/agenix/healthchecks-url \
                  --dry-run=client -o yaml | kubectl apply -f -
                kubectl create secret generic healthchecks-url \
                  --namespace=backup \
                  --from-file=HC_URL=/agenix/healthchecks-url \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "  ✓ healthchecks-url"
              fi

              echo "=== Secret injection complete ==="
          volumeMounts:
            - name: agenix
              mountPath: /agenix
              readOnly: true
      volumes:
        - name: agenix
          hostPath:
            path: /run/agenix
            type: DirectoryOrCreate
