# Longhorn — documented Helm values (ConfigMap, not a Helm deployment)
# Wave 1
# For live Helm management, convert the longhorn Application to a multi-source
# Helm app pointing at https://charts.longhorn.io (chart: longhorn).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: longhorn-helm-values
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
data:
  values.yaml: |
    defaultSettings:
      backupTarget: "s3://longhorn-backups@us-east-1/"
      backupTargetCredentialSecret: b2-credentials
      createDefaultDiskLabeledNodes: true
      defaultDataPath: /var/lib/longhorn
      replicaAutoBalance: best-effort
      storageOverProvisioningPercentage: 100
      defaultReplicaCount: 2

    persistence:
      defaultClass: true
      defaultFsType: ext4

    longhornUI:
      replicas: 1
