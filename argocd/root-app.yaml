---
# Root Application — entrypoint for App-of-Apps.
# Points at argocd/ directory; ArgoCD recursively discovers all child Applications
# organized by sync-wave in argocd/wave-N/ subdirectories.
#
# This is the one Application NOT managed by ArgoCD itself.
# It is applied imperatively during cluster bootstrap (NixOS provisioning).
# Changes to this file require manual `kubectl apply`.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  annotations:
    resources-finalizer.argocd.argoproj.io: "true"
spec:
  project: default
  source:
    repoURL: https://github.com/2143-Labs/2143-59s
    targetRevision: refs/heads/master
    path: argocd
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
