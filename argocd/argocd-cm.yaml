# ArgoCD ConfigMap — health checks and resource tracking
# Applied during bootstrap. ArgoCD manages itself via GitOps after bootstrap.
# Sync wave: applied imperatively before root Application (or as wave -3 if self-managed).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Restore Application CRD health check removed in ArgoCD 1.8 (issue #3781).
  # Required for App-of-Apps sync-wave progression: without this, child Applications
  # are considered "healthy" on creation and all waves execute simultaneously.
  resource.customizations.health.argoproj.io_Application: |
    hs = {}
    hs.status = "Progressing"
    hs.message = ""
    if obj.status ~= nil then
      if obj.status.health ~= nil then
        hs.status = obj.status.health.status
        if obj.status.health.message ~= nil then
          hs.message = obj.status.health.message
        end
      end
    end
    return hs

  # Use annotation+label tracking for ecosystem compatibility.
  # annotation: precise tracking via argocd.argoproj.io/tracking-id
  # label: app.kubernetes.io/instance label for Helm/operator compatibility
  application.resourceTrackingMethod: annotation+label
