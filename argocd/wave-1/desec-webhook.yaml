# Wave 0: deSEC webhook for cert-manager DNS01 — after cert-manager CRDs
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: desec-webhook
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/manifest-generate-paths: .
spec:
  project: default
  source:
    repoURL: https://github.com/2143-Labs/2143-59s
    targetRevision: refs/heads/master
    path: base/cert-manager/desec-webhook
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true