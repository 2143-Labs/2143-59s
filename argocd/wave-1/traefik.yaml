# Wave 1: Traefik — ingress controller (Helm chart + local middlewares)
# Multi-source: deploys Traefik Helm chart, then our middleware CRs.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    # Source 1: Traefik Helm chart
    - chart: traefik
      repoURL: https://helm.traefik.io/traefik
      targetRevision: 34.0.0
      helm:
        valuesObject:
          providers:
            kubernetesIngress:
              enabled: true
            kubernetesCRD:
              enabled: true
              allowCrossNamespace: true
          experimental:
            plugins:
              crowdsec-bouncer-traefik-plugin:
                moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
                version: "v1.4.5"
          ports:
            web:
              hostPort: 80
            websecure:
              hostPort: 443
          service:
            type: ClusterIP
          hostNetwork: true
    # Source 2: Middleware CRs and dashboard IngressRoute
    - repoURL: https://github.com/2143-Labs/2143-59s
      targetRevision: refs/heads/master
      path: base/traefik
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
